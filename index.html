<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Tim Hansen — Documentary and Television Editor based in London.">
<title>Tim Hansen — Television Editor</title>
<style>
:root{--bg:#0d0d0d;--text:#f3f0e8;--muted:#aaa69d;--line:rgba(255,255,255,.22);--tile:rgba(12,12,12,.30);--tile-hover:rgba(243,240,232,.94);--tile-hover-text:#111;--width:1180px}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;min-height:100vh;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}body.modal-open{overflow:hidden}a,button{color:inherit;font:inherit}button{appearance:none}
.backgrounds,.backgrounds::after{position:fixed;inset:0;pointer-events:none}.backgrounds{z-index:-2;overflow:hidden;background:radial-gradient(circle at 15% 10%,rgba(255,255,255,.08),transparent 35%),linear-gradient(135deg,#171717,#090909 65%)}.backgrounds::after{content:"";z-index:2;background:rgba(0,0,0,.68)}.background{position:absolute;inset:-3%;opacity:0;background-position:center;background-size:cover;transform:scale(1.03);transition:opacity 1.8s ease;animation:drift 18s ease-in-out infinite alternate}.background.is-active{opacity:1}@keyframes drift{from{transform:scale(1.03)}to{transform:scale(1.09) translate3d(-1.2%,-.8%,0)}}
.version{position:fixed;top:14px;right:18px;z-index:20;color:rgba(255,255,255,.45);font-size:12px;letter-spacing:.08em}.shell{width:min(calc(100% - 48px),var(--width));margin:0 auto;padding:74px 0 42px}.hero{width:min(660px,100%);margin:0 auto;text-align:center}.eyebrow{margin:0 0 15px;color:var(--muted);font-size:12px;letter-spacing:.17em;text-transform:uppercase}h1{margin:0;font:400 clamp(4.2rem,9vw,7.4rem)/.88 Georgia,"Times New Roman",serif;letter-spacing:-.055em}.intro{max-width:620px;margin:27px auto 0;color:rgba(243,240,232,.76);font-size:clamp(1rem,1.4vw,1.15rem);line-height:1.58}
.tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:28px;margin:74px auto 0}.tile{position:relative;display:grid;place-items:center;aspect-ratio:1.18/1;min-height:235px;padding:28px;border:1px solid var(--line);background:var(--tile);color:var(--text);text-align:center;text-decoration:none;cursor:pointer;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);transition:background .22s ease,color .22s ease,border-color .22s ease,transform .22s ease}.tile:hover,.tile:focus-visible{border-color:var(--text);background:var(--tile-hover);color:var(--tile-hover-text);transform:translateY(-4px);outline:none}.tile-label{font:400 clamp(1.8rem,3vw,3rem)/1 Georgia,"Times New Roman",serif;letter-spacing:-.025em}.tile-arrow{position:absolute;right:18px;bottom:16px;font-size:18px;opacity:.55;transition:transform .2s ease}.tile:hover .tile-arrow,.tile:focus-visible .tile-arrow{transform:translateX(4px);opacity:1}
.footer{display:flex;justify-content:space-between;gap:24px;margin-top:70px;padding-top:24px;border-top:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.52);font-size:12px}.footer a{color:inherit}
.modal{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.96);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease,visibility .22s ease}.modal.is-open{opacity:1;visibility:visible;pointer-events:auto}.modal-inner{width:min(1100px,100%);transform:translateY(12px);transition:transform .22s ease}.modal.is-open .modal-inner{transform:translateY(0)}.modal-top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:14px}.modal-title{margin:0;font-size:12px;letter-spacing:.12em;text-transform:uppercase}.back-button{border:1px solid rgba(255,255,255,.28);background:transparent;padding:10px 14px;color:var(--text);cursor:pointer}.back-button:hover,.back-button:focus-visible{background:var(--text);color:#111;outline:none}.video-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000}.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
@media(max-width:820px){.shell{padding-top:60px}.tiles{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.shell{width:min(calc(100% - 28px),var(--width))}.tiles{grid-template-columns:1fr;gap:16px;margin-top:50px}.tile{min-height:170px;aspect-ratio:1.65/1}.footer{display:block}.footer span:last-child{display:block;margin-top:8px}.modal{padding:14px}.modal-top{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="backgrounds" id="backgrounds" aria-hidden="true"></div>
<div class="version">Version 1.4</div>
<main class="shell">
<section class="hero" aria-labelledby="page-title">
<p class="eyebrow">Television Editor · London</p>
<h1 id="page-title">Tim Hansen</h1>
<p class="intro">Documentary editor working across science, factual, history, music and travel television. Selected work, credits and contact details.</p>
</section>
<section class="tiles" aria-label="Portfolio navigation">
<button class="tile js-open-clip" type="button" data-title="Music"><span class="tile-label">Music</span><span class="tile-arrow" aria-hidden="true">→</span></button>
<button class="tile js-open-clip" type="button" data-title="Science"><span class="tile-label">Science</span><span class="tile-arrow" aria-hidden="true">→</span></button>
<button class="tile js-open-clip" type="button" data-title="Factual"><span class="tile-label">Factual</span><span class="tile-arrow" aria-hidden="true">→</span></button>
<button class="tile js-open-clip" type="button" data-title="History"><span class="tile-label">History</span><span class="tile-arrow" aria-hidden="true">→</span></button>
<button class="tile js-open-clip" type="button" data-title="Travel"><span class="tile-label">Travel</span><span class="tile-arrow" aria-hidden="true">→</span></button>
<a class="tile" href="Editor_Tim_Hansen_CV_JUL2026.pdf" target="_blank" rel="noopener"><span class="tile-label">CV</span><span class="tile-arrow" aria-hidden="true">↗</span></a>
</section>
<footer class="footer"><span>© <span id="year"></span> Tim Hansen</span><span><a href="mailto:hello@timhansen.co.uk">hello@timhansen.co.uk</a></span></footer>
</main>
<div class="modal" id="clip-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-title">
<div class="modal-inner"><div class="modal-top"><p class="modal-title" id="modal-title">Selected work</p><a href="#home" class="back-button" id="close-clip" role="button">← Back to splash page</a></div><div class="video-frame" id="video-frame"></div></div>
</div>
<script>
const backgroundFiles=["images/hero-01.jpg","images/hero-02.jpg","images/hero-03.jpg","images/hero-04.jpg","images/hero-05.jpg","images/hero-06.jpg"];
const backgrounds=document.getElementById("backgrounds"),loadedBackgrounds=[];let activeBackground=0;
backgroundFiles.forEach(src=>{const image=new Image();image.onload=()=>{const layer=document.createElement("div");layer.className="background";layer.style.backgroundImage=`url("${src}")`;backgrounds.appendChild(layer);loadedBackgrounds.push(layer);if(loadedBackgrounds.length===1)layer.classList.add("is-active")};image.src=src});
setInterval(()=>{if(loadedBackgrounds.length<2)return;loadedBackgrounds[activeBackground].classList.remove("is-active");activeBackground=(activeBackground+1)%loadedBackgrounds.length;loadedBackgrounds[activeBackground].classList.add("is-active")},11000);
const modal=document.getElementById("clip-modal"),videoFrame=document.getElementById("video-frame"),modalTitle=document.getElementById("modal-title"),closeButton=document.getElementById("close-clip"),openButtons=document.querySelectorAll(".js-open-clip");let lastFocusedElement=null;
function openClip(button){lastFocusedElement=document.activeElement;modalTitle.textContent=`${button.dataset.title} — temporary test clip`;const iframe=document.createElement("iframe");iframe.src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0&modestbranding=1";iframe.title=`${button.dataset.title} — temporary test clip`;iframe.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";iframe.referrerPolicy="strict-origin-when-cross-origin";iframe.allowFullscreen=true;videoFrame.replaceChildren(iframe);modal.classList.add("is-open");modal.setAttribute("aria-hidden","false");document.body.classList.add("modal-open");closeButton.focus()}
function closeClip(event){if(event){event.preventDefault();event.stopPropagation()}modal.classList.remove("is-open");modal.setAttribute("aria-hidden","true");document.body.classList.remove("modal-open");videoFrame.replaceChildren();if(window.location.hash!=="#home"){history.replaceState(null,"",window.location.pathname+window.location.search+"#home")}if(lastFocusedElement)lastFocusedElement.focus()}
openButtons.forEach(button=>button.addEventListener("click",()=>openClip(button)));closeButton.addEventListener("click",closeClip);modal.addEventListener("click",event=>{if(event.target===modal)closeClip()});document.addEventListener("keydown",event=>{if(event.key==="Escape"&&modal.classList.contains("is-open"))closeClip()});document.getElementById("year").textContent=new Date().getFullYear();
</script>
</body>
</html>
