<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Hansen</title>
<style>
body{margin:0;background:#111;color:#f3f0e8;font-family:Arial,sans-serif}
.wrap{max-width:1100px;margin:auto;padding:40px}
.version{position:fixed;top:16px;right:20px;color:#999;font-size:14px}
h1{font:400 5rem Georgia,serif;margin:80px 0 20px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:60px}
.card{display:flex;align-items:end;justify-content:space-between;min-height:220px;padding:24px;
border:1px solid #333;text-decoration:none;color:white;background:#1a1a1a}
button.card{width:100%;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);padding:40px}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal iframe{width:min(1000px,90vw);aspect-ratio:16/9;border:0}
.close{position:absolute;top:20px;right:30px;color:white;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div class="version">Version 1.1</div>

<div class="wrap">
<h1>Tim Hansen</h1>

<div class="cards">
<button class="card" onclick="openClip()">
<div><strong>Clips</strong><br><small>Temporary Rick Astley test clip</small></div>
<div>→</div>
</button>

<a class="card" href="Editor_Tim_Hansen_CV_JUL2026" target="_blank">
<div><strong>CV</strong><br><small>Open CV</small></div>
<div>→</div>
</a>

<a class="card" href="mailto:hello@timhansen.co.uk">
<div><strong>Contact</strong></div>
<div>→</div>
</a>
</div>
</div>

<div id="modal" class="modal">
<div class="close" onclick="closeClip()">✕ Close</div>
<iframe id="player"
src=""
allow="autoplay; encrypted-media; picture-in-picture"
allowfullscreen></iframe>
</div>

<script>
function openClip(){
 document.getElementById("modal").classList.add("show");
 document.getElementById("player").src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
}
function closeClip(){
 document.getElementById("modal").classList.remove("show");
 document.getElementById("player").src="";
}
</script>
</body>
</html>
