<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tim Hansen — Television Editor, London.">
<title>Tim Hansen — Television Editor</title>
<style>
:root{--bg:#0b0c0e;--text:#f2f2f0;--muted:#aaaeb4;--line:#5e6269;--pad:clamp(1.4rem,5vw,6rem)}
*{box-sizing:border-box}html{background:var(--bg);color-scheme:dark}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 75% 20%,rgba(255,255,255,.025),transparent 28%),var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit}.page{width:min(1500px,100%);margin:0 auto;padding:clamp(4rem,8vw,8rem) var(--pad) 2.2rem}
.eyebrow,.card-label,.footer{text-transform:uppercase;letter-spacing:.22em}
.eyebrow{margin:0 0 1rem;font-size:.78rem}
h1{margin:0;font-size:clamp(4rem,10vw,9.5rem);line-height:.88;letter-spacing:-.065em;font-weight:400}
.intro{margin:2rem 0 0;max-width:34rem;color:var(--muted);font-size:clamp(1.05rem,1.7vw,1.35rem);line-height:1.55}
.primary-link{display:inline-flex;align-items:center;justify-content:space-between;gap:2rem;min-width:20rem;margin-top:2.2rem;padding:1.35rem 1.6rem;border:1px solid var(--line);text-decoration:none;text-transform:uppercase;letter-spacing:.2em;font-size:.75rem;transition:.2s}
.primary-link:hover,.primary-link:focus-visible{border-color:var(--text);background:var(--text);color:var(--bg)}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1.7rem;margin-top:clamp(3rem,6vw,5rem)}
.card{min-height:19rem;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1.4rem;border:1px solid var(--line);text-decoration:none;transition:.2s}
.card:hover,.card:focus-visible{border-color:var(--text);transform:translateY(-4px);background:rgba(255,255,255,.025)}
.icon{width:3.4rem;height:3.4rem;display:grid;place-items:center;color:var(--muted)}
.icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.45;stroke-linecap:round;stroke-linejoin:round}
.card-label{font-size:.78rem}.footer{margin-top:3rem;color:var(--muted);font-size:.68rem}
@media(max-width:850px){.cards{grid-template-columns:1fr}.card{min-height:12rem}}
@media(max-width:520px){.page{padding-top:3rem}.primary-link{min-width:0;width:100%}h1{font-size:clamp(3.8rem,20vw,6rem)}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<main class="page">
<section aria-labelledby="page-title">
<p class="eyebrow">Television Editor · London</p>
<h1 id="page-title">Tim Hansen</h1>
<p class="intro">I’m a television editor with 25+ years’ experience crafting character-led stories across science, history, engineering and current affairs.</p>
<a class="primary-link" href="#" aria-label="Watch Tim Hansen's showreel"><span>Watch showreel</span><span aria-hidden="true">→</span></a>
</section>

<section class="cards" aria-label="Portfolio navigation">
<a class="card" href="#">
<span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="18"></circle><path d="M20 16.5 32 24 20 31.5Z"></path></svg></span>
<span class="card-label">Showreel</span>
</a>
<a class="card" href="#">
<span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><rect x="8" y="10" width="32" height="23" rx="1.5"></rect><path d="M18 39h12M24 33v6"></path></svg></span>
<span class="card-label">Featured work</span>
</a>
<a class="card" href="mailto:hello@timhansen.co.uk">
<span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><rect x="7" y="12" width="34" height="24" rx="1.5"></rect><path d="m8 14 16 13 16-13"></path></svg></span>
<span class="card-label">Contact</span>
</a>
</section>

<footer class="footer">© <span id="year"></span> Tim Hansen</footer>
</main>
<script>document.getElementById("year").textContent=new Date().getFullYear();</script>
</body>
</html>
